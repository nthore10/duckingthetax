<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimated Trade Value (ETV)</title>
<meta name="description" content="Estimated Trade Value (ETV) for NBA players. Weighted contract valuation combining salary, performance, and age for trade analysis.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg-base:#1E2228;--bg-raised:#252A31;--bg-panel:#22272E;--bg-row-hover:#262C33;--bg-input:#2A3038;--accent:#00D89A;--accent-dark:#00A878;--text-bright:#F2F4F7;--text-primary:#C8D1DC;--text-muted:#9AA6B4;--text-dim:#7A8694;--text-faint:#5E6873;--border:#2E343D;--border-soft:#282E35;--border-input:#353C46;--bar-hot:#FF6B85;--bar-warm:#FFB454;--bar-cool:#00D89A;--rank-num:#4E5763;--positive:#00D89A;--negative:#FF6B85;--font-display:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-display);background:var(--bg-base);color:var(--text-primary);min-height:100vh;}
  .tm-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-wrap:wrap;gap:16px;}
  .tm-title-wrap{display:flex;align-items:center;gap:14px;}
  .tm-badge{width:38px;height:38px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:12px;color:var(--bg-base);}
  .tm-title{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--text-bright);letter-spacing:-0.3px;line-height:1;}
  .tm-title-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:3px;}
  .tm-meta{display:flex;gap:24px;}
  .tm-meta-item{text-align:right;}
  .tm-meta-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
  .tm-meta-value{font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--accent);margin-top:2px;line-height:1;}
  .container{max-width:1400px;margin:0 auto;padding:18px 16px;}
  .weights-panel{background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;}
  .weights-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .weights-title{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
  .weights-actions{display:flex;gap:8px;}
  .btn{font-family:var(--font-mono);font-size:9px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:7px 14px;border-radius:6px;border:1px solid var(--border-input);cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--accent);color:var(--bg-base);border-color:var(--accent);font-weight:700;}
  .btn-primary:hover{opacity:.85;}
  .btn-outline{background:var(--bg-input);color:var(--text-muted);}
  .btn-outline:hover{border-color:var(--accent);color:var(--text-bright);}
  .weights-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
  .weight-item{background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;padding:11px;}
  .weight-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;display:block;}
  .weight-input-row{display:flex;align-items:center;gap:6px;}
  .weight-input{flex:1;background:var(--bg-input);border:1px solid var(--border-input);border-radius:4px;padding:7px 10px;font-family:var(--font-mono);font-size:13px;color:var(--text-bright);outline:none;transition:border-color .15s;}
  .weight-input:focus{border-color:var(--accent);}
  .weight-suffix{font-family:var(--font-mono);font-size:12px;color:var(--text-dim);}
  .total-weight-row{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;align-items:center;gap:10px;}
  .total-label{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
  .total-value{font-family:var(--font-display);font-size:20px;font-weight:700;}
  .total-value.valid{color:var(--accent);}.total-value.invalid{color:var(--bar-hot);}
  .controls{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .search-wrap{flex:1;min-width:200px;}
  .search-wrap input{width:100%;font-family:var(--font-mono);font-size:12px;padding:9px 13px;border:1px solid var(--border-input);border-radius:6px;background:var(--bg-input);color:var(--text-bright);outline:none;transition:border-color .15s;}
  .search-wrap input:focus{border-color:var(--accent);}.search-wrap input::placeholder{color:var(--text-faint);}
  .filter-sel{font-family:var(--font-mono);font-size:12px;padding:9px 13px;border:1px solid var(--border-input);border-radius:6px;background:var(--bg-input);color:var(--text-bright);outline:none;cursor:pointer;min-width:150px;}
  .filter-sel:focus{border-color:var(--accent);}
  .table-container{background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .table-scroll{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;}
  thead{background:var(--bg-panel);}
  th{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--text-dim);text-align:left;padding:12px 16px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s;font-weight:400;text-transform:uppercase;}
  th:hover{color:var(--accent);}
  th.sorted{color:var(--accent);}
  th .sort-icon{display:inline-block;margin-left:5px;opacity:.4;}
  th.sorted .sort-icon{opacity:1;}
  td{padding:12px 16px;border-bottom:1px solid var(--border-soft);vertical-align:middle;font-family:var(--font-mono);font-size:12px;color:var(--text-primary);}
  tbody tr{transition:background .12s;}
  tbody tr:hover{background:var(--bg-row-hover);}
  tbody tr:last-child td{border-bottom:none;}
  .rank-cell{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--rank-num);width:46px;}
  .rank-cell.top-10{color:var(--accent);}
  .contract-badge{display:inline-block;font-family:var(--font-mono);font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:3px;font-weight:400;text-transform:uppercase;}
  .badge-rookie{background:rgba(0,216,154,0.12);color:var(--accent);}
  .badge-standard{background:rgba(255,180,84,0.12);color:var(--bar-warm);}
  .badge-max,.badge-supermax{background:rgba(255,107,133,0.12);color:var(--bar-hot);}
  .badge-veteran{background:var(--bg-input);color:var(--text-muted);}
  .badge-extension{background:rgba(0,216,154,0.12);color:var(--accent);}
  .badge-default{background:var(--bg-input);color:var(--text-dim);}
  .player-name{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--text-bright);}
  .team-cell{display:flex;align-items:center;gap:10px;}
  .team-logo{width:30px;height:30px;object-fit:contain;}
  .team-name-label{font-size:12px;color:var(--text-muted);}
  .etv-cell{border-radius:4px;padding:5px 10px;display:inline-block;min-width:60px;text-align:center;}
  .etv-value{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--text-bright);}
  .loading{display:flex;flex-direction:column;align-items:center;padding:60px 20px;color:var(--text-dim);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .tm-footer{padding:13px 24px;font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
  @media(max-width:768px){.container{padding:12px;}.weights-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}.tm-header{padding:16px;}}
  ::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-track{background:var(--bg-base);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div id="dtt-nav"></div>
<script src="/nav.js"></script>

<div class="tm-header">
  <div class="tm-title-wrap">
    <div class="tm-badge">ETV</div>
    <div>
      <div class="tm-title">Estimated Trade Value</div>
      <div class="tm-title-sub">// Weighted contract valuation</div>
    </div>
  </div>
</div>

<div class="container">
  <div class="weights-panel">
    <div class="weights-header">
      <div class="weights-title">Category Weights</div>
      <div class="weights-actions">
        <button class="btn btn-outline" onclick="resetWeights()">Reset Defaults</button>
        <button class="btn btn-primary" onclick="applyWeights()">Apply Weights</button>
      </div>
    </div>
    <div class="weights-grid" id="weightsGrid"><div class="loading"><div class="spinner"></div><span>Loading weights...</span></div></div>
    <div class="total-weight-row"><span class="total-label">Total Weight:</span><span class="total-value" id="totalWeight">0%</span></div>
  </div>

  <div class="controls">
    <div class="search-wrap"><input type="text" id="searchInput" placeholder="Search players..."></div>
    <select class="filter-sel" id="teamFilter"><option value="">All Teams</option></select>
    <select class="filter-sel" id="contractFilter"><option value="">All Contracts</option></select>
  </div>

  <div class="table-container">
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th data-sort="rank">Rank <span class="sort-icon">↓</span></th>
          <th data-sort="contract">Contract <span class="sort-icon">↕</span></th>
          <th data-sort="player">Player <span class="sort-icon">↕</span></th>
          <th data-sort="team">Team <span class="sort-icon">↕</span></th>
          <th data-sort="etv" class="sorted">ETV <span class="sort-icon">↓</span></th>
        </tr></thead>
        <tbody id="tableBody"><tr><td colspan="5"><div class="loading"><div class="spinner"></div><span>Loading player data...</span></div></td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<div class="tm-footer">
  <span>Source · Live Workbook</span>
  <span>Updated Daily</span>
</div>

<script>
(function(){
  var _gbi = document.getElementById.bind(document);
  var _removed = {kpiTeams:1,kpiTotal:1,kpiPayroll:1,kpiPlayers:1,kpiDiff:1,kpiNet:1,kpiPayers:1,kpiTax:1,kpiCount:1,totalPlayers:1,avgSalary:1,totalPayroll:1,totalUnderContract:1,totalProjected:1,totalDifference:1,tenDayCount:1};
  var _stub = function(){ var s={textContent:'',innerHTML:'',value:'',style:{}}; return s; };
  document.getElementById = function(id){ var el=_gbi(id); if(el) return el; if(_removed[id]) return _stub(); return null; };
})();
</script>
<script>
const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const teamNames={ATL:'Atlanta Hawks',BOS:'Boston Celtics',BKN:'Brooklyn Nets',CHA:'Charlotte Hornets',CHI:'Chicago Bulls',CLE:'Cleveland Cavaliers',DAL:'Dallas Mavericks',DEN:'Denver Nuggets',DET:'Detroit Pistons',GSW:'Golden State Warriors',HOU:'Houston Rockets',IND:'Indiana Pacers',LAC:'LA Clippers',LAL:'Los Angeles Lakers',MEM:'Memphis Grizzlies',MIA:'Miami Heat',MIL:'Milwaukee Bucks',MIN:'Minnesota Timberwolves',NOP:'New Orleans Pelicans',NYK:'New York Knicks',OKC:'Oklahoma City Thunder',ORL:'Orlando Magic',PHI:'Philadelphia 76ers',PHX:'Phoenix Suns',POR:'Portland Trail Blazers',SAC:'Sacramento Kings',SAS:'San Antonio Spurs',TOR:'Toronto Raptors',UTA:'Utah Jazz',WAS:'Washington Wizards'};
function logoUrl(abbr){const id=nbaIds[abbr];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}
const weightToColumn={'Contract':'Contract ETV','Performance':'Performance ETV','Age':'Age ETV'};

let rawData=[],processedData=[],weights={},defaultWeights={},sortColumn='etv',sortDirection='desc';
function parseNumber(v){if(!v&&v!==0)return 0;let s=String(v).trim();const neg=s.startsWith('(')&&s.endsWith(')');if(neg)s=s.slice(1,-1);s=s.replace(/[$,\s]/g,'');let n=parseFloat(s);if(isNaN(n))return 0;return neg?-Math.abs(n):n;}
function parseCSV(text){const lines=text.trim().split('\n');const headers=parseCSVLine(lines[0]);const data=[];for(let i=1;i<lines.length;i++){const vals=parseCSVLine(lines[i]);if(vals.length===headers.length){const row={};headers.forEach((h,j)=>{row[h.trim()]=vals[j];});data.push(row);}}return{headers,data};}
function parseCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}r.push(cur.trim());return r;}
function findTeamAbbr(teamStr){if(!teamStr)return null;const up=teamStr.toUpperCase().trim();if(nbaIds[up])return up;const map={ATL:['HAWKS','ATLANTA'],BOS:['CELTICS','BOSTON'],BKN:['NETS','BROOKLYN'],CHA:['HORNETS','CHARLOTTE'],CHI:['BULLS','CHICAGO'],CLE:['CAVALIERS','CAVS','CLEVELAND'],DAL:['MAVERICKS','MAVS','DALLAS'],DEN:['NUGGETS','DENVER'],DET:['PISTONS','DETROIT'],GSW:['WARRIORS','GOLDEN STATE'],HOU:['ROCKETS','HOUSTON'],IND:['PACERS','INDIANA'],LAC:['CLIPPERS','LA CLIPPERS'],LAL:['LAKERS','LOS ANGELES LAKERS'],MEM:['GRIZZLIES','MEMPHIS'],MIA:['HEAT','MIAMI'],MIL:['BUCKS','MILWAUKEE'],MIN:['TIMBERWOLVES','WOLVES','MINNESOTA'],NOP:['PELICANS','NEW ORLEANS'],NYK:['KNICKS','NEW YORK'],OKC:['THUNDER','OKLAHOMA'],ORL:['MAGIC','ORLANDO'],PHI:['76ERS','SIXERS','PHILADELPHIA'],PHX:['SUNS','PHOENIX'],POR:['BLAZERS','TRAIL BLAZERS','PORTLAND'],SAC:['KINGS','SACRAMENTO'],SAS:['SPURS','SAN ANTONIO'],TOR:['RAPTORS','TORONTO'],UTA:['JAZZ','UTAH'],WAS:['WIZARDS','WASHINGTON']};for(const[abbr,ids]of Object.entries(map)){for(const id of ids){if(up.includes(id))return abbr;}}return null;}
function getContractClass(t){if(!t)return'badge-default';const ct=t.toLowerCase();if(ct.includes('rookie'))return'badge-rookie';if(ct.includes('supermax'))return'badge-supermax';if(ct.includes('max'))return'badge-max';if(ct.includes('veteran'))return'badge-veteran';if(ct.includes('extension'))return'badge-extension';if(ct.includes('standard'))return'badge-standard';return'badge-default';}

function extractWeights(data){weights={};defaultWeights={};data.forEach(row=>{const n=row['Weight'];const p=row['Weight Percent'];if(n&&p){let v=parseFloat(String(p).replace('%','').trim());if(!isNaN(v)){if(v>0&&v<1)v*=100;weights[n.trim()]=v;defaultWeights[n.trim()]=v;}}});renderWeights();}
function renderWeights(){const grid=document.getElementById('weightsGrid');if(!Object.keys(weights).length){grid.innerHTML='<p style="color:var(--text-dim)">No weight data</p>';return;}grid.innerHTML='';Object.entries(weights).forEach(([name,val])=>{const div=document.createElement('div');div.className='weight-item';div.innerHTML=`<label class="weight-label">${name}</label><div class="weight-input-row"><input type="number" class="weight-input" data-weight="${name}" value="${val}" min="0" max="100" step="1"><span class="weight-suffix">%</span></div>`;grid.appendChild(div);});grid.querySelectorAll('.weight-input').forEach(inp=>{inp.addEventListener('input',updateTotalWeight);inp.addEventListener('change',updateTotalWeight);});updateTotalWeight();}
function updateTotalWeight(){let total=0;document.querySelectorAll('.weight-input').forEach(inp=>total+=parseFloat(inp.value)||0);const el=document.getElementById('totalWeight');el.textContent=total.toFixed(0)+'%';el.className='total-value '+(Math.abs(total-100)<0.5?'valid':'invalid');}
function resetWeights(){weights={...defaultWeights};renderWeights();recalcETV();renderTable();}
function applyWeights(){document.querySelectorAll('.weight-input').forEach(inp=>{weights[inp.dataset.weight]=parseFloat(inp.value)||0;});recalcETV();renderTable();}
function recalcETV(){processedData.forEach(p=>{let newETV=0;Object.entries(weights).forEach(([wn,wp])=>{const col=weightToColumn[wn];if(col&&p.componentETVs[col]!==undefined){const origW=defaultWeights[wn]||0;if(origW>0){const base=p.componentETVs[col]/(origW/100);newETV+=base*(wp/100);}}});p.calculatedETV=newETV;});sortData();}
function sortData(){processedData.sort((a,b)=>{let av,bv;if(sortColumn==='player'){av=a.player||'';bv=b.player||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}if(sortColumn==='team'){av=a.team||'';bv=b.team||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}if(sortColumn==='contract'){av=a.contractType||'';bv=b.contractType||'';return sortDirection==='asc'?av.localeCompare(bv):bv.localeCompare(av);}av=a.calculatedETV||0;bv=b.calculatedETV||0;return sortDirection==='asc'?av-bv:bv-av;});processedData.forEach((p,i)=>p.rank=i+1);}
function processData(data){processedData=data.filter(row=>{const player=row['Player'],etv=row['Estimated Trade Value (ETV)'];if(!player||!etv)return false;return!isNaN(parseFloat(String(etv).replace(/[^0-9.-]/g,'')));}).map((row,idx)=>({rank:idx+1,contractType:row['Contract Type']||'',player:row['Player']||'',team:row['Team']||'',teamAbbr:findTeamAbbr(row['Team']||''),originalETV:parseNumber(row['Estimated Trade Value (ETV)']),calculatedETV:parseNumber(row['Estimated Trade Value (ETV)']),componentETVs:{'Contract ETV':parseNumber(row['Contract ETV']),'Performance ETV':parseNumber(row['Performance ETV']),'Age ETV':parseNumber(row['Age ETV'])}}));sortData();const teams=[...new Set(processedData.map(p=>p.teamAbbr).filter(Boolean))].sort();const contracts=[...new Set(processedData.map(p=>p.contractType).filter(Boolean))].sort();const tf=document.getElementById('teamFilter');tf.innerHTML='<option value="">All Teams</option>';teams.forEach(t=>tf.innerHTML+=`<option value="${t}">${teamNames[t]||t}</option>`);const cf=document.getElementById('contractFilter');cf.innerHTML='<option value="">All Contracts</option>';contracts.forEach(c=>cf.innerHTML+=`<option value="${c}">${c}</option>`);}
function getFiltered(){const s=document.getElementById('searchInput').value.toLowerCase();const t=document.getElementById('teamFilter').value;const c=document.getElementById('contractFilter').value;return processedData.filter(p=>{if(s&&!p.player.toLowerCase().includes(s)&&!p.team.toLowerCase().includes(s))return false;if(t&&p.teamAbbr!==t)return false;if(c&&p.contractType!==c)return false;return true;});}
function getETVColor(val,mn,mx){if(mn===mx)return'rgba(0,216,154,0.10)';const norm=(val-mn)/(mx-mn);if(norm<=0.5){const i=norm*2;return`rgba(255,${Math.round(107+i*73)},${Math.round(133-i*49)},${0.10+i*0.06})`;}const i=(norm-0.5)*2;return`rgba(${Math.round(255-i*255)},${Math.round(180+i*36)},${Math.round(84+i*70)},${0.10+i*0.10})`;}
function renderTable(){const tbody=document.getElementById('tableBody');const filtered=getFiltered();if(!filtered.length){tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase">No players found</td></tr>';document.getElementById('kpiPlayers').textContent=0;return;}document.getElementById('kpiPlayers').textContent=filtered.length;const etvVals=filtered.map(p=>p.calculatedETV);const mn=Math.min(...etvVals),mx=Math.max(...etvVals);tbody.innerHTML=filtered.map((p,i)=>{const rank=i+1;const logo=logoUrl(p.teamAbbr)||'';const teamDisplay=teamNames[p.teamAbbr]||p.team;const etvColor=getETVColor(p.calculatedETV,mn,mx);return`<tr><td class="rank-cell ${rank<=10?'top-10':''}">${rank}</td><td><span class="contract-badge ${getContractClass(p.contractType)}">${p.contractType||'N/A'}</span></td><td><span class="player-name">${p.player}</span></td><td><div class="team-cell">${logo?`<img src="${logo}" alt="${teamDisplay}" class="team-logo" onerror="this.style.display='none'">`:''}<span class="team-name-label">${teamDisplay}</span></div></td><td><div class="etv-cell" style="background:${etvColor}"><span class="etv-value">${p.calculatedETV.toFixed(2)}</span></div></td></tr>`;}).join('');updateSortHeaders();}
function updateSortHeaders(){document.querySelectorAll('th[data-sort]').forEach(th=>{const col=th.dataset.sort;th.classList.toggle('sorted',col===sortColumn);th.querySelector('.sort-icon').textContent=col===sortColumn?(sortDirection==='asc'?'↑':'↓'):'↕';});}
document.querySelectorAll('th[data-sort]').forEach(th=>{th.addEventListener('click',()=>{const col=th.dataset.sort;if(sortColumn===col)sortDirection=sortDirection==='asc'?'desc':'asc';else{sortColumn=col;sortDirection=col==='etv'?'desc':'asc';}sortData();renderTable();});});
document.getElementById('searchInput').addEventListener('input',renderTable);
document.getElementById('teamFilter').addEventListener('change',renderTable);
document.getElementById('contractFilter').addEventListener('change',renderTable);
