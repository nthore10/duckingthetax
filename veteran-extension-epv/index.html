<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veteran Extension EPV</title>
<meta name="description" content="Veteran extension EPV. Projected value versus extension terms for veteran-eligible NBA players.">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{--bg-base:#1E2228;--bg-raised:#252A31;--bg-panel:#22272E;--bg-row-hover:#262C33;--bg-input:#2A3038;--accent:#00D89A;--accent-dark:#00A878;--text-bright:#F2F4F7;--text-primary:#C8D1DC;--text-muted:#9AA6B4;--text-dim:#7A8694;--text-faint:#5E6873;--border:#2E343D;--border-soft:#282E35;--border-input:#353C46;--bar-hot:#FF6B85;--bar-warm:#FFB454;--bar-cool:#00D89A;--positive:#00D89A;--negative:#FF6B85;--font-display:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-display);background:var(--bg-base);color:var(--text-primary);min-height:100vh;}
  .tm-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-wrap:wrap;gap:16px;}
  .tm-title-wrap{display:flex;align-items:center;gap:14px;}
  .tm-badge{width:38px;height:38px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--bg-base);}
  .tm-title{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--text-bright);letter-spacing:-0.3px;line-height:1;}
  .tm-title-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:3px;}
  .tm-controls{display:flex;gap:10px;padding:12px 24px;background:var(--bg-panel);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:flex-end;}
  .ctrl-group{display:flex;flex-direction:column;}
  .ctrl-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
  .tm-controls select,.tm-controls input{font-family:var(--font-mono);font-size:12px;padding:7px 11px;border:1px solid var(--border-input);border-radius:6px;background:var(--bg-input);color:var(--text-bright);outline:none;transition:border-color .15s;}
  .tm-controls select:focus,.tm-controls input:focus{border-color:var(--accent);}
  .tm-controls input[type="text"]{min-width:170px;}.tm-controls input::placeholder{color:var(--text-faint);}
  .reset-btn{font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;border:1px solid var(--border-input);background:var(--bg-input);color:var(--text-muted);border-radius:6px;cursor:pointer;transition:all .15s;}
  .reset-btn:hover{border-color:var(--accent);color:var(--text-bright);}
  .loading{text-align:center;padding:80px 20px;}
  .spinner{width:34px;height:34px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;min-width:1050px;}
  thead th{background:var(--bg-raised);color:var(--text-dim);font-family:var(--font-mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s;font-weight:400;}
  thead th:hover{color:var(--accent);}
  thead th.sorted-asc::after{content:' ▲';color:var(--accent);font-size:8px;}
  thead th.sorted-desc::after{content:' ▼';color:var(--accent);font-size:8px;}
  thead th.col-right{text-align:right;}thead th.col-center{text-align:center;}
  tbody tr{border-bottom:1px solid var(--border-soft);background:var(--bg-base);transition:background .12s;}
  tbody tr:hover{background:var(--bg-row-hover);}
  td{padding:10px 14px;vertical-align:middle;white-space:nowrap;font-family:var(--font-mono);font-size:12px;color:var(--text-primary);}
  td.col-right{text-align:right;}td.col-center{text-align:center;}
  .player-name{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--text-bright);}
  .team-cell{display:flex;align-items:center;gap:8px;}
  .team-logo{width:24px;height:24px;object-fit:contain;flex-shrink:0;}
  .team-name-sm{color:var(--text-dim);font-size:11px;font-family:var(--font-mono);}
  .money{font-variant-numeric:tabular-nums;}
  .money.positive{color:var(--positive);font-weight:700;}
  .money.negative{color:var(--negative);font-weight:700;}
  .money.neutral{color:var(--text-primary);}
  .money.unsigned{color:var(--text-faint);font-style:italic;}
  .years-select{background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-bright);padding:4px 6px;border-radius:4px;font-size:12px;font-family:var(--font-mono);outline:none;cursor:pointer;width:50px;text-align:center;}
  .years-select:hover,.years-select:focus{border-color:var(--accent);}
  .tm-footer{padding:13px 24px;font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
  .refresh-btn{position:fixed;bottom:20px;right:20px;background:var(--accent);color:var(--bg-base);border:none;padding:10px 18px;border-radius:6px;font-family:var(--font-mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.4);z-index:100;transition:opacity .15s;}
  .refresh-btn:hover{opacity:.85;}
  @media(max-width:768px){.tm-header{padding:16px;}}
  ::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-track{background:var(--bg-base);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div id="dtt-nav"></div>
<script src="/nav.js"></script>

<div class="tm-header">
  <div class="tm-title-wrap">
    <div class="tm-badge">VX</div>
    <div>
      <div class="tm-title">Veteran Extension EPV</div>
      <div class="tm-title-sub">// Veteran extension value vs. terms</div>
    </div>
  </div>
</div>

<div class="tm-controls" id="controls"></div>
<div class="table-wrap"><div id="app"><div class="loading"><div class="spinner"></div><p>Fetching live data&hellip;</p></div></div></div>

<div class="tm-footer">
  <span>Source · Live Workbook</span>
  <span>Updated Daily</span>
</div>
<button class="refresh-btn" onclick="init()">&#8635; Refresh</button>

<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vQ9jJpsamj56RIR756PoJSOaRgPSc9yDZ5nkpWUjO-ECjRMGsBq_Q-_s4vPcpfCSg/pub?gid=163789958&single=true&output=csv';

const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHO:1610612766,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const TEAM_NAME_TO_ABBR={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHO','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','LA Clippers':'LAC','Los Angeles Clippers':'LAC','LA Lakers':'LAL','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};
function logoUrl(code){const id=nbaIds[code];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}
function getTeamLogo(teamName){const abbr=TEAM_NAME_TO_ABBR[teamName];const u=logoUrl(abbr);return u?`<img class="team-logo" src="${u}" alt="${abbr}">`:'';}

let allRows=[],yearOverrides={},sortCol='epvValue',sortDir='desc';
let filterTeam='ALL',searchText='';

function esc(s){return (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function parseNum(str){if(!str)return null;let s=str.toString().trim();if(s===''||s==='-'||s==='--')return null;let neg=false;if(s.startsWith('(')&&s.endsWith(')')){neg=true;s=s.slice(1,-1);}if(s.startsWith('-')){neg=true;s=s.slice(1);}const n=parseFloat(s.replace(/[\$,\s]/g,''));if(isNaN(n))return null;return neg?-n:n;}
function formatMoneyFull(val){if(val===null||val===undefined||isNaN(val))return '\u2014';const prefix=val<0?'-':'';return prefix+'$'+Math.abs(val).toLocaleString('en-US',{maximumFractionDigits:0});}
function overUnderClass(val){if(val===null||val===undefined)return 'money unsigned';if(val>0)return 'money positive';if(val<0)return 'money negative';return 'money neutral';}

function parseRows(data){
  const rows=[];
  data.forEach((raw,i)=>{
    const norm={};Object.keys(raw).forEach(k=>norm[k.toLowerCase().replace(/[^a-z0-9]/g,'')]=raw[k]);
    const get=(...cands)=>{for(const c of cands){const key=c.toLowerCase().replace(/[^a-z0-9]/g,'');if(norm[key]!==undefined)return norm[key];}return '';};
    const player=(get('player','name')||'').trim();
    if(!player)return;
    rows.push({
      player:player,
      team:(get('team')||'').trim(),
      actualExtension:parseNum(get('actualextensionamount','actual extension amount')),
      actualAnnualized:parseNum(get('actualannualized','actual annualized')),
      years:parseNum(get('years','yrs'))||1,
      extensionEPV:parseNum(get('extensionepv','extension epv')),
      epvAnnualized:parseNum(get('epvannualized','epv annualized')),
      overUnder:parseNum(get('valueoverextensionifextended','value over extension (if extended)','value over extension','valueoverextension')),
      yearEPVs:[parseNum(get('1yearepv','1 year epv')),parseNum(get('2yearepv','2 year epv')),parseNum(get('3yearepv','3 year epv')),parseNum(get('4yearepv','4 year epv')),parseNum(get('5yearepv','5 year epv'))],
      _idx:i
    });
  });
  return rows;
}

function getEffectiveYears(row){return yearOverrides[row._idx]!==undefined?yearOverrides[row._idx]:row.years;}
function getEPVValue(row){const yrs=getEffectiveYears(row);const idx=yrs-1;if(idx>=0&&idx<5&&row.yearEPVs[idx]!==null)return row.yearEPVs[idx];return row.epvAnnualized!==null?row.epvAnnualized*yrs:null;}
function getEPVAnnualized(row){const v=getEPVValue(row);const yrs=getEffectiveYears(row);return v!==null&&yrs>0?v/yrs:null;}

function init(){
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div><p>Fetching live data&hellip;</p></div>';
  document.getElementById('controls').innerHTML='';
  yearOverrides={};
  Papa.parse(CSV_URL,{
    download:true,header:true,skipEmptyLines:true,dynamicTyping:false,
    complete(results){
      try{
        allRows=parseRows(results.data||[]);
        if(!allRows.length)throw new Error('No data rows');
        renderControls();
        sortCol='epvValue';sortDir='desc';
        renderTable();
      }catch(e){showError(e.message);}
    },
    error(e){showError(e.message);}
  });
}
function showError(msg){document.getElementById('app').innerHTML=`<div style="text-align:center;padding:60px;color:var(--bar-hot);font-family:var(--font-mono);font-size:11px;letter-spacing:2px">Error: ${esc(msg)}<br><br>Make sure the Google Sheet is published.</div>`;}

function renderControls(){
  const teams=[...new Set(allRows.map(r=>r.team).filter(Boolean))].sort();
  document.getElementById('controls').innerHTML=`
    <div class="ctrl-group"><span class="ctrl-label">Team</span><select onchange="filterTeam=this.value;renderTable()"><option value="ALL">All</option>${teams.map(t=>`<option${t===filterTeam?' selected':''}>${esc(t)}</option>`).join('')}</select></div>
    <div class="ctrl-group"><span class="ctrl-label">Search</span><input type="text" placeholder="Player name..." value="${esc(searchText)}" oninput="searchText=this.value;renderTable()"></div>
    <button class="reset-btn" onclick="resetFilters()">Reset</button>`;
}
function resetFilters(){filterTeam='ALL';searchText='';yearOverrides={};renderControls();renderTable();}

function getFiltered(){
  return allRows.filter(r=>{
    if(filterTeam!=='ALL'&&r.team!==filterTeam)return false;
    if(searchText&&!r.player.toLowerCase().includes(searchText.toLowerCase()))return false;
    return true;
  });
}
function getSorted(rows){
  if(!sortCol)return rows;
  const copy=[...rows];
  copy.sort((a,b)=>{
    let va,vb;
    if(sortCol==='epvValue'){va=getEPVValue(a);vb=getEPVValue(b);}
    else if(sortCol==='epvAnnualized'){va=getEPVAnnualized(a);vb=getEPVAnnualized(b);}
    else if(sortCol==='effectiveYears'){va=getEffectiveYears(a);vb=getEffectiveYears(b);}
    else{va=a[sortCol];vb=b[sortCol];}
    if(typeof va==='string')va=va.toLowerCase();
    if(typeof vb==='string')vb=vb.toLowerCase();
    if(va===null&&vb===null)return 0;
    if(va===null)return 1;
    if(vb===null)return -1;
    if(va<vb)return sortDir==='asc'?-1:1;
    if(va>vb)return sortDir==='asc'?1:-1;
    return 0;
  });
  return copy;
}
function setSort(col){if(sortCol===col){sortDir=sortDir==='asc'?'desc':'asc';}else{sortCol=col;sortDir=(col==='player'||col==='team')?'asc':'desc';}renderTable();}

const COLS=[
  {key:'player',label:'Player',cls:''},
  {key:'team',label:'Team',cls:''},
  {key:'effectiveYears',label:'Years',cls:'col-center'},
  {key:'epvValue',label:'Extension EPV',cls:'col-right'},
  {key:'epvAnnualized',label:'EPV Ann.',cls:'col-right'},
  {key:'actualExtension',label:'Actual Extension',cls:'col-right'},
  {key:'actualAnnualized',label:'Actual Ann.',cls:'col-right'},
  {key:'overUnder',label:'Value Over Ext.',cls:'col-right'}
];

function renderTable(){
  const data=getSorted(getFiltered());
  const thHTML=COLS.map(c=>{const sortedCls=c.key===sortCol?(sortDir==='asc'?'sorted-asc':'sorted-desc'):'';return `<th class="${c.cls} ${sortedCls}" onclick="setSort('${c.key}')">${c.label}</th>`;}).join('');
  if(!data.length){document.getElementById('app').innerHTML=`<table><thead><tr>${thHTML}</tr></thead><tbody><tr><td colspan="${COLS.length}" style="text-align:center;padding:40px;color:var(--text-dim)">No players found</td></tr></tbody></table>`;return;}
  const body=data.map(r=>{
    const epvVal=getEPVValue(r),epvAnn=getEPVAnnualized(r);
    const effYears=getEffectiveYears(r);
    const yearOpts=[1,2,3,4,5].map(y=>`<option value="${y}"${y===effYears?' selected':''}>${y}</option>`).join('');
    return `<tr>
      <td><span class="player-name">${esc(r.player)}</span></td>
      <td><div class="team-cell">${getTeamLogo(r.team)}<span class="team-name-sm">${esc(r.team)||'—'}</span></div></td>
      <td class="col-center"><select class="years-select" onchange="onYearChange(${r._idx},this.value)">${yearOpts}</select></td>
      <td class="col-right" id="epv-val-${r._idx}"><span class="money neutral">${formatMoneyFull(epvVal)}</span></td>
      <td class="col-right" id="epv-ann-${r._idx}"><span class="money neutral">${formatMoneyFull(epvAnn)}</span></td>
      <td class="col-right"><span class="money neutral">${r.actualExtension!==null?formatMoneyFull(r.actualExtension):'<span class="money unsigned">N/A</span>'}</span></td>
      <td class="col-right"><span class="money neutral">${r.actualAnnualized!==null?formatMoneyFull(r.actualAnnualized):'—'}</span></td>
      <td class="col-right"><span class="${overUnderClass(r.overUnder)}">${r.overUnder!==null?formatMoneyFull(r.overUnder):'—'}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('app').innerHTML=`<table><thead><tr>${thHTML}</tr></thead><tbody>${body}</tbody></table>`;
}

function onYearChange(idx,val){
  yearOverrides[idx]=parseInt(val);
  const row=allRows.find(r=>r._idx===idx);
  if(!row)return;
  const epvVal=getEPVValue(row),epvAnn=getEPVAnnualized(row);
  const epvCell=document.getElementById('epv-val-'+idx);
  const annCell=document.getElementById('epv-ann-'+idx);
  if(epvCell)epvCell.innerHTML='<span class="money neutral">'+formatMoneyFull(epvVal)+'</span>';
  if(annCell)annCell.innerHTML='<span class="money neutral">'+formatMoneyFull(epvAnn)+'</span>';
}

init();
</script>
</body>
</html>
