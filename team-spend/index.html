<body>

<div id="root"></div>
<script>
let DATA = {"Atlanta Hawks":{"guaranteed":[35100000,0,0,0,0,0]},"Phoenix Suns":{"guaranteed":[34370879,30571429,26033510,13285715,0,0],"playerOption":[0,6367200,6802469,0,0,0]},"New York Knicks":{"guaranteed":[15002184,13285574,0,0,0,0],"nonGuaranteed":[0,0,14196853,6587500,0,0],"toNonGuar":[0,0,0,3015460,0,0]},"Washington Wizards":{"guaranteed":[55079422,53447364,57406428,0,0,0],"playerOption":[0,0,0,61365492,0,0],"nonGuaranteed":[0,5870678,6150234,0,0,0]},"Los Angeles Lakers":{"guaranteed":[110020274,101569455,107721790,0,0,0],"playerOption":[0,9731707,0,113874126,0,0]},"Charlotte Hornets":{"guaranteed":[26811594,24666667,22521739,0,0,0]},"Oklahoma City Thunder":{"guaranteed":[28148148,25000000,0,0,0,0],"poToOption":[0,0,26851852,0,0,0]},"Minnesota Timberwolves":{"guaranteed":[24846187,24188505,22400000,23944828,0,0],"nonGuaranteed":[2449422,0,3580247,0,0,0],"playerOption":[0,0,0,0,25489655,0]},"Boston Celtics":{"guaranteed":[20119670,31285085,16873351,14500000,15500000,0],"playerOption":[0,0,16548400,0,0,0]},"Miami Heat":{"guaranteed":[8949422,17000000,0,0,0,0],"playerOption":[0,0,17000000,0,0,0]},"Cleveland Cavaliers":{"guaranteed":[2449422,60911849,65784797,70657745,0,0],"playerOption":[0,0,0,0,75530693,0]},"San Antonio Spurs":{"guaranteed":[38044000,74304664,61989141,50469818,53950495,0],"playerOption":[0,0,0,0,0,57431172]},"Utah Jazz":{"guaranteed":[26286401,11000000,0,0,0,0],"teamOption":[0,15681993,0,0,0,0]},"Detroit Pistons":{"guaranteed":[30450723,8746479,0,0,0,0],"teamOption":[0,0,8746479,0,0,0],"nonGuaranteed":[0,17000000,17000000,0,0,0]},"Golden State Warriors":{"guaranteed":[32299000,7163100,0,0,0,0],"poNonGuar":[0,20000000,0,0,0,0],"playerOption":[0,5750850,0,0,0,0]},"Brooklyn Nets":{"guaranteed":[32768293,0,0,0,0,0],"teamOption":[0,14500000,0,0,0,0],"poToOption":[0,18731707,0,0,0,0]},"Portland Trail Blazers":{"guaranteed":[16449422,0,0,0,0,0],"nonGuaranteed":[0,14500000,15000000,0,0,0]},"Milwaukee Bucks":{"guaranteed":[20035714,21178571,16571429,17714286,0,0],"teamOption":[0,0,5750000,0,0,0],"nonGuaranteed":[2537527,0,0,0,0,0],"toNonGuar":[0,2756913,0,0,0,0]},"New Orleans Pelicans":{"guaranteed":[3876529,4070357,0,0,0,0]},"Los Angeles Clippers":{"guaranteed":[21580760,2753334,0,0,0,0],"nonGuaranteed":[0,5000000,7884446,0,0,0],"teamOption":[0,14341464,0,3015557,0,0]},"Sacramento Kings":{"guaranteed":[7927422,5751900,0,0,0,0],"teamOption":[0,2664401,0,0,0,0]},"Chicago Bulls":{"guaranteed":[30000000,0,0,0,0,0],"teamOption":[0,31075000,0,0,0,0]},"Philadelphia 76ers":{"guaranteed":[18400000,9450000,9900000,0,0,0],"nonGuaranteed":[0,0,0,10350000,0,0],"playerOption":[0,6300000,0,0,0,0]},"Houston Rockets":{"guaranteed":[22565146,15175862,16300000,17424138,0,0],"playerOption":[0,6367200,0,0,18548276,0]},"Orlando Magic":{"guaranteed":[7348266,0,0,0,0,0]},"Indiana Pacers":{"guaranteed":[10499422,8450000,0,0,0,0]},"Toronto Raptors":{"guaranteed":[4634538,0,0,0,0,0],"nonGuaranteed":[0,2571895,0,0,0,0]},"Denver Nuggets":{"guaranteed":[6256607,0,0,0,0,0]},"Memphis Grizzlies":{"guaranteed":[9000000,0,0,0,0,0],"nonGuaranteed":[0,8550000,8550000,0,0,0]},"Dallas Mavericks":{"guaranteed":[3000000,0,0,0,0,0],"teamOption":[0,3000000,0,0,0,0]}};

const YEARS = ['2026/27','2027/28','2028/29','2029/30','2030/31','2031/32'];
const YEAR_SHORT = ["'26","'27","'28","'29","'30","'31"];

// bottom-to-top stack order, matching the season chart
const STATUS_ORDER = [
  { key: 'guaranteed',    label: 'Guaranteed',                     color: '#191c21' },
  { key: 'playerOption',  label: 'Player Option',                  color: '#1e9e46' },
  { key: 'poToOption',    label: 'Player Option / Team Option',    color: '#3fb6e8' },
  { key: 'poNonGuar',     label: 'Player Option / Non-Guaranteed', color: '#5fd97a' },
  { key: 'teamOption',    label: 'Team Option',                    color: '#f5820a' },
  { key: 'toNonGuar',     label: 'Team Option / Non-Guaranteed',   color: '#e838d8' },
  { key: 'nonGuaranteed', label: 'Non-Guaranteed',                 color: '#e02020' },
];

function fmtM(v) {
  if (v >= 1000000) return '$' + (v / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  return '$' + Math.round(v / 1000) + 'K';
}

// ---- Live data from the cap-sheets workbook (falls back to the DATA constant above) ----
const PUB = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub';
const TX_URL = PUB + '?gid=1373103186&single=true&output=csv'; // free-agency transactions
const YEARCOL = [8, 10, 12, 14, 16, 18]; // amount cols; status = col+1
const STATUS2KEY = { 'Guaranteed':'guaranteed', 'Player Option':'playerOption', 'Player Option/Team Option':'poToOption', 'Player Option/Non-Guaranteed':'poNonGuar', 'Team Option':'teamOption', 'Team Option/Non-Guaranteed':'toNonGuar', 'Non-Guaranteed':'nonGuaranteed' };
function parseCSV(t){const rows=[];let cur='';for(const line of t.split('\n')){cur+=(cur?'\n':'')+line;if((cur.match(/"/g)||[]).length%2===0){rows.push(parseRow(cur));cur='';}}if(cur)rows.push(parseRow(cur));return rows;}
function parseRow(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){r.push(c);c='';}else if(ch!=='\r')c+=ch;}r.push(c);return r;}
const clean=v=>(v||'').replace(/ /g,' ').trim();
const money=v=>{v=clean(v).replace(/[$,\s]/g,'');if(!v)return 0;const n=parseFloat(v);return isNaN(n)?0:n;};
function aggregate(txText){
  const rows = parseCSV(txText).slice(1).filter(r => clean(r[7])); // ALL rows (signings + extensions)
  const out = {};
  rows.forEach(r => {
    const team = clean(r[4]); if (!team) return;
    for (let s = 0; s < 6; s++) {
      const amt = money(r[YEARCOL[s]]); if (amt <= 0) continue;
      const key = STATUS2KEY[clean(r[YEARCOL[s] + 1])]; if (!key) continue;
      if (!out[team]) out[team] = {};
      if (!out[team][key]) out[team][key] = [0,0,0,0,0,0];
      out[team][key][s] += amt;
    }
  });
  if (!Object.keys(out).length) throw new Error('no rows parsed');
  DATA = out;
}

function renderVals() {
  const chartHeight = 92;
  const axisMax = 120000000;
  const scale = chartHeight / axisMax;

  const teams = Object.keys(DATA).sort().map(name => {
    const rows = DATA[name];
    const grand = Object.values(rows).reduce((s, arr) => s + arr.reduce((a, b) => a + b, 0), 0);
    const years = YEARS.map((ylabel, i) => {
      const segs = STATUS_ORDER
        .map(st => ({ st, v: (rows[st.key] || [])[i] || 0 }))
        .filter(x => x.v > 0);
      const total = segs.reduce((s, x) => s + x.v, 0);
      return {
        totalHeightPx: total > 0 ? Math.max(2, total * scale) : 0,
        barBorder: total > 0 ? '1.5px solid #191c21' : 'none',
        title: ylabel + ' total: $' + total.toLocaleString(),
        segments: segs.map(x => ({
          heightPx: x.v * scale,
          color: x.st.color,
          title: x.st.label + ': $' + x.v.toLocaleString(),
        })),
      };
    });
    return { name, totalLabel: fmtM(grand), years };
  });

  const gridLines = [];
  for (let v = 30000000; v <= axisMax; v += 30000000) {
    gridLines.push({ topPct: (1 - v / axisMax) * 100 });
  }

  const legend = STATUS_ORDER.map(st => ({
    label: st.label,
    color: st.color,
    textColor: st.key === 'guaranteed' ? '#191c21' : st.color,
    border: 'none',
  }));
  legend.push({ label: 'Total (outline)', color: 'transparent', textColor: '#191c21', border: '1.5px solid #191c21' });

  return { teams, gridLines, legend, yearShort: YEAR_SHORT, maxLabel: '$120M' };
}

function draw() {
const V = renderVals();

const legendHtml = V.legend.map(item =>
  `<div style="display:flex; align-items:center; gap:8px;">
     <div style="width:16px; height:11px; background:${item.color}; border:${item.border}; box-sizing:border-box; flex-shrink:0;"></div>
     <span style="font:700 12px 'Archivo', sans-serif; color:${item.textColor};">${item.label}</span>
   </div>`).join('');

const teamsHtml = V.teams.map(t => {
  const gl = V.gridLines.map(g => `<div style="position:absolute; left:0; right:0; top:${g.topPct}%; border-top:1px solid #e3ddd1;"></div>`).join('');
  const bars = t.years.map(y => {
    const segs = y.segments.map(seg => `<div style="height:${seg.heightPx}px; background:${seg.color}; flex-shrink:0;" title="${seg.title}"></div>`).join('');
    return `<div style="width:15px; height:${y.totalHeightPx}px; border:${y.barBorder}; box-sizing:border-box; border-radius:1px; overflow:hidden; display:flex; flex-direction:column-reverse;" title="${y.title}">${segs}</div>`;
  }).join('');
  const yearLabels = V.yearShort.map(lbl => `<div style="width:15px; text-align:center; font:500 8px 'IBM Plex Mono', monospace; color:#b0aa9c;">${lbl}</div>`).join('');
  return `<div style="display:flex; flex-direction:column; align-items:center;">
    <div style="font:700 11.5px 'Archivo', sans-serif; color:#191c21; text-align:center; line-height:1.15; height:auto; display:flex; align-items:flex-end;">${t.name}</div>
    <div style="font:600 10px 'IBM Plex Mono', monospace; color:#a39d90; margin:2px 0 6px;">${t.totalLabel} committed</div>
    <div style="position:relative; width:100%; height:92px;">
      ${gl}
      <div style="position:absolute; inset:0; display:flex; justify-content:space-around; align-items:flex-end;">${bars}</div>
    </div>
    <div style="display:flex; justify-content:space-around; width:100%; margin-top:5px; border-top:1px solid #d8d2c4; padding-top:4px;">${yearLabels}</div>
  </div>`;
}).join('');

document.getElementById('root').innerHTML = `
<div style="display:flex; justify-content:center; padding:8px; box-sizing:border-box;">
  <div style="background:#f6f3ec; border-radius:3px; box-shadow:0 1px 4px rgba(0,0,0,.10); padding:28px 30px; width:100%; box-sizing:border-box;">

    <div style="font:600 13px 'IBM Plex Mono', monospace; letter-spacing:.1em; color:#c3bdb0;">02</div>
    <div style="margin-top:6px; font:600 12px 'IBM Plex Mono', monospace; letter-spacing:.18em; text-transform:uppercase; color:#a9534a;">2026 Free Agency · Team by Team</div>
    <h1 style="font:800 26px/1.06 'Archivo', sans-serif; color:#191c21; letter-spacing:-.015em; margin:8px 0 0;">Yearly Spend by Team By Contract Type</h1>

    <div style="display:flex; flex-wrap:wrap; gap:6px 20px; margin:14px 0 20px;">${legendHtml}</div>

    <div style="display:grid; grid-template-columns:repeat(6, 1fr); gap:10px 18px;">${teamsHtml}</div>

    <div style="border-top:1px solid #e3ddd1; margin-top:20px; padding-top:10px; display:flex; justify-content:space-between; gap:24px;">
      <div style="font:500 11px/1.5 'IBM Plex Mono', monospace; letter-spacing:.02em; color:#a39d90; text-transform:uppercase;">All charts share one scale · gridlines every $30M · max ${V.maxLabel}</div>
      <div style="font:500 11px/1.5 'IBM Plex Mono', monospace; letter-spacing:.02em; color:#a39d90; text-transform:uppercase;">Seasons 2026/27 – 2031/32</div>
    </div>

  </div>
</div>`;
}

// Fetch live data, then draw — fall back to the embedded DATA on any failure.
fetch(TX_URL)
  .then(r => r.ok ? r.text() : Promise.reject(new Error('tx ' + r.status)))
  .then(txText => { try { aggregate(txText); } catch (e) { console.error('Team spend: aggregation failed, using fallback', e); } draw(); })
  .catch(e => { console.error('Team spend: fetch failed, using fallback data', e); draw(); });
</script>
</body>
</html>
