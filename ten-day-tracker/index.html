<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10-Day Contract Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1E2228;--bg-raised:#252A31;--bg-panel:#22272E;--bg-row-hover:#262C33;--bg-input:#2A3038;
    --accent:#00D89A;--accent-dark:#00A878;
    --text-bright:#F2F4F7;--text-primary:#C8D1DC;--text-muted:#9AA6B4;--text-dim:#7A8694;--text-faint:#5E6873;
    --border:#2E343D;--border-soft:#282E35;--border-input:#353C46;
    --bar-hot:#FF6B85;--bar-warm:#FFB454;--bar-cool:#00D89A;--rank-num:#4E5763;
    --font-display:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-display);background:var(--bg-base);color:var(--text-primary);min-height:100vh;}
  .tm-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-wrap:wrap;gap:16px;}
  .tm-title-wrap{display:flex;align-items:center;gap:14px;}
  .tm-badge{width:38px;height:38px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:12px;color:var(--bg-base);}
  .tm-title{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--text-bright);letter-spacing:-0.3px;line-height:1;}
  .tm-title-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:3px;}
  .tm-meta{display:flex;gap:24px;}
  .tm-meta-item{text-align:right;}
  .tm-meta-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
  .tm-meta-value{font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--accent);margin-top:2px;line-height:1;}
  .loading{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px;}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
  .table-wrapper{overflow-x:auto;}
  table{border-collapse:collapse;width:100%;}
  thead th{position:sticky;top:0;z-index:15;background:var(--bg-raised);font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:12px 16px;text-align:left;font-weight:400;white-space:nowrap;user-select:none;cursor:pointer;transition:color .15s;border-bottom:1px solid var(--border);}
  thead th:hover{color:var(--accent);}
  thead th.sort-active{color:var(--accent);}
  thead th .sort-arrow{font-size:8px;margin-left:3px;opacity:.4;}
  thead th.sort-active .sort-arrow{opacity:1;}
  thead th.align-right{text-align:right;}thead th.align-center{text-align:center;}
  tbody tr{border-bottom:1px solid var(--border-soft);background:var(--bg-base);transition:background .12s;}
  tbody tr:hover{background:var(--bg-row-hover);}
  tbody td{padding:12px 16px;font-size:12px;white-space:nowrap;font-family:var(--font-mono);color:var(--text-primary);}
  td.player-cell{font-family:var(--font-display);font-weight:600;font-size:13px;color:var(--text-bright);}
  td.player-cell .hardship-tag{font-family:var(--font-mono);font-size:10px;font-weight:400;color:var(--accent);margin-left:6px;}
  .tm-team-cell{display:flex;align-items:center;gap:10px;}
  .tm-team-logo{width:24px;height:24px;object-fit:contain;flex-shrink:0;}
  td.team-cell{color:var(--text-muted);}
  td.date-cell{color:var(--text-dim);}
  td.days-cell{text-align:center;font-weight:700;}
  td.yos-cell{text-align:center;color:var(--text-muted);}
  td.cap-cell{text-align:right;color:var(--text-bright);font-weight:700;}
  .days-active{color:var(--accent);}.days-expired{color:var(--text-faint);}
  .tm-footer{padding:13px 24px;font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
  @media(max-width:768px){.tm-header{padding:16px;}}
  ::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-track{background:var(--bg-base);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div id="dtt-nav"></div>
<script src="/nav.js"></script>

<div class="tm-header">
  <div class="tm-title-wrap">
    <div class="tm-badge">10D</div>
    <div>
      <div class="tm-title">10-Day Contract Tracker</div>
      <div class="tm-title-sub">// Active 10-day signings &middot; * denotes hardship</div>
    </div>
  </div>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div><p>Loading&hellip;</p></div>
</div>

<div class="tm-footer">
  <span>Source · Live Workbook</span>
  <span>Updated Daily</span>
</div>

<script>
(function(){
  var _gbi = document.getElementById.bind(document);
  var _removed = {kpiTeams:1,kpiTotal:1,kpiPayroll:1,kpiPlayers:1,kpiDiff:1,kpiNet:1,kpiPayers:1,kpiTax:1,kpiCount:1,totalPlayers:1,avgSalary:1,totalPayroll:1,totalUnderContract:1,totalProjected:1,totalDifference:1,tenDayCount:1};
  var _stub = function(){ var s={textContent:'',innerHTML:'',value:'',style:{}}; return s; };
  document.getElementById = function(id){ var el=_gbi(id); if(el) return el; if(_removed[id]) return _stub(); return null; };
})();
</script>
<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub?gid=2125971386&single=true&output=csv';
const FALLBACK_B64='UGxheWVyLFRlYW0sU3RhcnQgRGF0ZSxFbmQgRGF0ZSxEYXlzIExlZnQsWWVhcnMgb2YgU2VydmljZSxDYXAgSGl0';

const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHO:1610612766,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
const teamAbbrMap={'Atlanta Hawks':'ATL','Boston Celtics':'BOS','Brooklyn Nets':'BKN','Charlotte Hornets':'CHO','Chicago Bulls':'CHI','Cleveland Cavaliers':'CLE','Dallas Mavericks':'DAL','Denver Nuggets':'DEN','Detroit Pistons':'DET','Golden State Warriors':'GSW','Houston Rockets':'HOU','Indiana Pacers':'IND','LA Clippers':'LAC','Los Angeles Clippers':'LAC','LA Lakers':'LAL','Los Angeles Lakers':'LAL','Memphis Grizzlies':'MEM','Miami Heat':'MIA','Milwaukee Bucks':'MIL','Minnesota Timberwolves':'MIN','New Orleans Pelicans':'NOP','New York Knicks':'NYK','Oklahoma City Thunder':'OKC','Orlando Magic':'ORL','Philadelphia 76ers':'PHI','Phoenix Suns':'PHX','Portland Trail Blazers':'POR','Sacramento Kings':'SAC','San Antonio Spurs':'SAS','Toronto Raptors':'TOR','Utah Jazz':'UTA','Washington Wizards':'WAS'};
function logoUrl(team){const c=teamAbbrMap[team]||team;const id=nbaIds[c];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}

let allRows=[],sortCol=0,sortAsc=true;
function parseCSVLine(line){const v=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){v.push(cur.trim());cur='';}else cur+=ch;}v.push(cur.trim());return v;}
function parseCSV(text){const lines=text.trim().split('\n');const rows=[];for(let i=1;i<lines.length;i++){const v=parseCSVLine(lines[i]);if(!v[0])continue;rows.push({player:v[0],team:v[1]||'',start:v[2]||'',end:v[3]||'',daysLeft:parseInt(v[4])||0,yos:v[5]||'',capHit:v[6]||''});}return rows;}
function formatCap(s){if(!s||!s.trim()||s.trim()==='-')return'—';const n=parseFloat(s.replace(/[$,\s]/g,''));return isNaN(n)?s:'$'+n.toLocaleString('en-US',{maximumFractionDigits:0});}
function isHardship(p){return p.includes('*');}

function render(data){
  document.getElementById('kpiCount').textContent=data.length;
  if(!data.length){document.getElementById('app').innerHTML='<div style="text-align:center;padding:60px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase">No active 10-day contracts</div>';return;}
  let html=`<div class="table-wrapper"><table><thead><tr>
    <th onclick="doSort(0)">Player <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(1)">Team <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(2)">Start <span class="sort-arrow">⇅</span></th>
    <th onclick="doSort(3)">End <span class="sort-arrow">⇅</span></th>
    <th class="align-center" onclick="doSort(4)">Days Left <span class="sort-arrow">⇅</span></th>
    <th class="align-center" onclick="doSort(5)">YOS <span class="sort-arrow">⇅</span></th>
    <th class="align-right" onclick="doSort(6)">Cap Hit <span class="sort-arrow">⇅</span></th>
  </tr></thead><tbody>`;
  data.forEach(r=>{
    const hardship=isHardship(r.player);const name=r.player.replace('*','');const logo=logoUrl(r.team);
    html+=`<tr>
      <td class="player-cell">${name}${hardship?'<span class="hardship-tag">*</span>':''}</td>
      <td class="team-cell"><div class="tm-team-cell">${logo?`<img src="${logo}" class="tm-team-logo" alt="${r.team}">`:''}${r.team}</div></td>
      <td class="date-cell">${r.start}</td>
      <td class="date-cell">${r.end}</td>
      <td class="days-cell ${r.daysLeft>0?'days-active':'days-expired'}">${r.daysLeft}</td>
      <td class="yos-cell">${r.yos}</td>
      <td class="cap-cell">${formatCap(r.capHit)}</td>
    </tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('app').innerHTML=html;
}
function doSort(col){if(sortCol===col)sortAsc=!sortAsc;else{sortCol=col;sortAsc=true;}
  const keys=['player','team','start','end','daysLeft','yos','capHit'];const k=keys[col];
  const sorted=[...allRows].sort((a,b)=>{let av=a[k],bv=b[k];if(col===4)return sortAsc?av-bv:bv-av;av=(av||'').toString().toLowerCase();bv=(bv||'').toString().toLowerCase();return sortAsc?av.localeCompare(bv):bv.localeCompare(av);});
  render(sorted);}
async function init(){try{const resp=await fetch(CSV_URL);if(!resp.ok)throw new Error();allRows=parseCSV(await resp.text());render(allRows);}catch(e){try{allRows=parseCSV(atob(FALLBACK_B64));render(allRows);}catch(e2){document.getElementById('app').innerHTML='<div style="text-align:center;padding:80px;color:var(--bar-hot)">Failed to load data.</div>';}}}
init();
</script>
</body>
</html>
