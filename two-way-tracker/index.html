<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two-Way Tracker</title>
<meta name="description" content="NBA two-way contract tracker. Service days used by player and team, with alerts as players approach the limit.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-base:#1E2228;--bg-raised:#252A31;--bg-panel:#22272E;--bg-row-hover:#262C33;--bg-input:#2A3038;
    --accent:#00D89A;--accent-dark:#00A878;
    --text-bright:#F2F4F7;--text-primary:#C8D1DC;--text-muted:#9AA6B4;--text-dim:#7A8694;--text-faint:#5E6873;
    --border:#2E343D;--border-soft:#282E35;--border-input:#353C46;
    --bar-hot:#FF6B85;--bar-warm:#FFB454;--bar-cool:#00D89A;--rank-num:#4E5763;
    --font-display:'Space Grotesk',sans-serif;--font-mono:'Space Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-display);background:var(--bg-base);color:var(--text-primary);min-height:100vh;}
  .tm-header{padding:20px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--bg-raised);flex-wrap:wrap;gap:16px;}
  .tm-title-wrap{display:flex;align-items:center;gap:14px;}
  .tm-badge{width:38px;height:38px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:700;font-size:13px;color:var(--bg-base);}
  .tm-title{font-family:var(--font-display);font-weight:700;font-size:19px;color:var(--text-bright);letter-spacing:-0.3px;line-height:1;}
  .tm-title-sub{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:3px;}
  .tm-meta{display:flex;gap:24px;}
  .tm-meta-item{text-align:right;}
  .tm-meta-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
  .tm-meta-value{font-family:var(--font-display);font-weight:700;font-size:17px;color:var(--accent);margin-top:2px;line-height:1;}
  .search-bar{padding:12px 24px;background:var(--bg-panel);border-bottom:1px solid var(--border);}
  .search-bar input{font-family:var(--font-mono);font-size:12px;padding:8px 14px;border:1px solid var(--border-input);border-radius:6px;background:var(--bg-input);color:var(--text-bright);outline:none;width:100%;max-width:360px;transition:border-color .15s;}
  .search-bar input:focus{border-color:var(--accent);}
  .search-bar input::placeholder{color:var(--text-faint);}
  .loading{text-align:center;padding:80px 20px;}
  .loading-spinner{width:34px;height:34px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim);}
  .container{max-width:1400px;margin:0 auto;padding:20px 16px;}
  .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;}
  .team-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
  .team-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .team-logo-wrap{width:38px;height:38px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .team-logo-wrap img{width:100%;height:100%;object-fit:contain;}
  .team-info{flex:1;}
  .team-name{font-family:var(--font-display);font-size:15px;font-weight:700;color:var(--text-bright);line-height:1.1;}
  .conf-badge{display:inline-block;font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:3px;margin-top:4px;}
  .conf-badge.east{background:rgba(0,216,154,0.12);color:var(--accent);}
  .conf-badge.west{background:rgba(255,180,84,0.12);color:var(--bar-warm);}
  .under15-box{text-align:right;}
  .under15-value{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--accent);line-height:1;}
  .under15-label{font-family:var(--font-mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);}
  .players-list{padding:10px;}
  .player-row{display:flex;align-items:center;padding:11px;border-radius:6px;margin-bottom:6px;background:var(--bg-panel);transition:background .15s;}
  .player-row:last-child{margin-bottom:0;}
  .player-row:hover{background:var(--bg-row-hover);}
  .player-info{flex:1;}
  .player-name{font-family:var(--font-display);font-weight:600;font-size:14px;color:var(--text-bright);margin-bottom:3px;}
  .player-details{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);}
  .player-stats{text-align:right;margin-left:12px;}
  .games-count{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1;}
  .games-label{font-family:var(--font-mono);font-size:9px;color:var(--text-dim);margin-top:2px;}
  .progress-bar{width:100%;height:6px;background:var(--border);border-radius:4px;margin-top:8px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:4px;}
  .progress-fill.safe{background:var(--bar-cool);}
  .progress-fill.good{background:var(--bar-cool);}
  .progress-fill.warning{background:var(--bar-warm);}
  .progress-fill.danger{background:var(--bar-hot);}
  .games-count.safe{color:var(--bar-cool);}
  .games-count.good{color:var(--bar-cool);}
  .games-count.warning{color:var(--bar-warm);}
  .games-count.danger{color:var(--bar-hot);}
  .empty-state{text-align:center;padding:60px;color:var(--text-dim);font-family:var(--font-mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;}
  .tm-footer{padding:13px 24px;font-family:var(--font-mono);font-size:9px;letter-spacing:1.5px;color:var(--text-faint);text-transform:uppercase;background:var(--bg-panel);border-top:1px solid var(--border);display:flex;justify-content:space-between;}
  @media(max-width:768px){.team-grid{grid-template-columns:1fr;}.tm-header{padding:16px;}}
  ::-webkit-scrollbar{width:7px;height:7px;}::-webkit-scrollbar-track{background:var(--bg-base);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>
<div id="dtt-nav"></div>
<script src="/nav.js"></script>

<div class="tm-header">
  <div class="tm-title-wrap">
    <div class="tm-badge">2W</div>
    <div>
      <div class="tm-title">Two-Way Tracker</div>
      <div class="tm-title-sub">// Two-way service days by team</div>
    </div>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search players or teams...">
</div>

<div class="container">
  <div id="content"><div class="loading"><div class="loading-spinner"></div><p>Fetching data...</p></div></div>
</div>

<div class="tm-footer">
  <span>Source · Live Workbook</span>
  <span>Updated Daily</span>
</div>

<script>
(function(){
  var _gbi = document.getElementById.bind(document);
  var _removed = {kpiTeams:1,kpiTotal:1,kpiPayroll:1,kpiPlayers:1,kpiDiff:1,kpiNet:1,kpiPayers:1,kpiTax:1,kpiCount:1,totalPlayers:1,avgSalary:1,totalPayroll:1,totalUnderContract:1,totalProjected:1,totalDifference:1,tenDayCount:1};
  var _stub = function(){ var s={textContent:'',innerHTML:'',value:'',style:{}}; return s; };
  document.getElementById = function(id){ var el=_gbi(id); if(el) return el; if(_removed[id]) return _stub(); return null; };
})();
</script>
<script>
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vRTwTOS_rNBYI8d8zDUivGFWXsXcxlOZgrqn5o-WCvFC5aNAR3vLsSqllE7aO0BRw/pub?gid=164590079&single=true&output=csv';
const nbaIds={ATL:1610612737,BOS:1610612738,BKN:1610612751,CHA:1610612766,CHI:1610612741,CLE:1610612739,DAL:1610612742,DEN:1610612743,DET:1610612765,GSW:1610612744,HOU:1610612745,IND:1610612754,LAC:1610612746,LAL:1610612747,MEM:1610612763,MIA:1610612748,MIL:1610612749,MIN:1610612750,NOP:1610612740,NYK:1610612752,OKC:1610612760,ORL:1610612753,PHI:1610612755,PHX:1610612756,POR:1610612757,SAC:1610612758,SAS:1610612759,TOR:1610612761,UTA:1610612762,WAS:1610612764};
function logoUrl(abbr){const id=nbaIds[abbr];return id?`https://cdn.nba.com/logos/nba/${id}/primary/L/logo.svg`:'';}
const TEAM_CONF={ATL:'east',BOS:'east',BKN:'east',CHA:'east',CHI:'east',CLE:'east',DET:'east',IND:'east',MIA:'east',MIL:'east',NYK:'east',ORL:'east',PHI:'east',TOR:'east',WAS:'east',DAL:'west',DEN:'west',GSW:'west',HOU:'west',LAC:'west',LAL:'west',MEM:'west',MIN:'west',NOP:'west',OKC:'west',PHX:'west',POR:'west',SAC:'west',SAS:'west',UTA:'west'};
const TEAM_NAMES={ATL:'Atlanta Hawks',BOS:'Boston Celtics',BKN:'Brooklyn Nets',CHA:'Charlotte Hornets',CHI:'Chicago Bulls',CLE:'Cleveland Cavaliers',DAL:'Dallas Mavericks',DEN:'Denver Nuggets',DET:'Detroit Pistons',GSW:'Golden State Warriors',HOU:'Houston Rockets',IND:'Indiana Pacers',LAC:'Los Angeles Clippers',LAL:'Los Angeles Lakers',MEM:'Memphis Grizzlies',MIA:'Miami Heat',MIL:'Milwaukee Bucks',MIN:'Minnesota Timberwolves',NOP:'New Orleans Pelicans',NYK:'New York Knicks',OKC:'Oklahoma City Thunder',ORL:'Orlando Magic',PHI:'Philadelphia 76ers',PHX:'Phoenix Suns',POR:'Portland Trail Blazers',SAC:'Sacramento Kings',SAS:'San Antonio Spurs',TOR:'Toronto Raptors',UTA:'Utah Jazz',WAS:'Washington Wizards'};

let TWO_WAY_DATA={},searchQuery='';
function getStatus(pct){if(pct>=76)return'danger';if(pct>=51)return'warning';if(pct>=26)return'good';return'safe';}
function parseCSVLine(line){const r=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(inQ){if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}else if(c==='"')inQ=false;else cur+=c;}else{if(c==='"')inQ=true;else if(c===','){r.push(cur);cur='';}else cur+=c;}}r.push(cur);return r;}

function parseCSV(text){
  TWO_WAY_DATA={};
  const lines=text.split('\n');
  for(let i=1;i<lines.length;i++){
    const line=lines[i].trim();if(!line)continue;
    const cols=parseCSVLine(line);if(cols.length<7)continue;
    const teamAbbr=cols[0]?.trim(),teamName=cols[1]?.trim(),playerName=cols[2]?.trim();
    const effectiveDate=cols[3]?.trim(),gamesActive=parseInt(cols[4])||0,gamesAllowed=parseInt(cols[5])||50,gamesRemaining=parseInt(cols[6])||0;
    const remainingUnder15=parseInt(cols[8])||0;
    if(!teamAbbr||!playerName||teamAbbr==='Team Abbr'||teamAbbr.length>3)continue;
    if(!TWO_WAY_DATA[teamAbbr]){TWO_WAY_DATA[teamAbbr]={name:teamName||TEAM_NAMES[teamAbbr]||teamAbbr,conf:TEAM_CONF[teamAbbr]||'east',remainingUnder15,players:[]};}
    if(remainingUnder15>0)TWO_WAY_DATA[teamAbbr].remainingUnder15=remainingUnder15;
    TWO_WAY_DATA[teamAbbr].players.push({name:playerName,gamesPlayed:gamesActive,gamesAllowed,gamesRemaining,effectiveDate:effectiveDate||''});
  }
}

function updateKPIs(){
  let totalPlayers=0;Object.values(TWO_WAY_DATA).forEach(t=>totalPlayers+=t.players.length);
  document.getElementById('kpiPlayers').textContent=totalPlayers;
  document.getElementById('kpiTeams').textContent=Object.keys(TWO_WAY_DATA).length;
}

function renderTeams(){
  const content=document.getElementById('content');
  let teams=Object.entries(TWO_WAY_DATA).sort((a,b)=>a[1].name.localeCompare(b[1].name));
  if(searchQuery){const q=searchQuery.toLowerCase();teams=teams.filter(([abbr,d])=>d.name.toLowerCase().includes(q)||abbr.toLowerCase().includes(q)||d.players.some(p=>p.name.toLowerCase().includes(q)));}
  if(!teams.length){content.innerHTML='<div class="empty-state">No teams found</div>';return;}
  let html='<div class="team-grid">';
  for(const[abbr,team]of teams){
    const logo=logoUrl(abbr);
    html+=`<div class="team-card">
      <div class="team-header">
        <div class="team-logo-wrap"><img src="${logo}" alt="${abbr}" onerror="this.style.display='none'"></div>
        <div class="team-info"><div class="team-name">${team.name}</div><span class="conf-badge ${team.conf}">${team.conf.toUpperCase()}</span></div>
        <div class="under15-box"><div class="under15-value">${team.remainingUnder15||0}</div><div class="under15-label">Under 15 Left</div></div>
      </div>
      <div class="players-list">`;
    const sorted=[...team.players].sort((a,b)=>(b.gamesPlayed/b.gamesAllowed)-(a.gamesPlayed/a.gamesAllowed));
    for(const p of sorted){
      const pct=(p.gamesPlayed/p.gamesAllowed)*100;const status=getStatus(pct);
      html+=`<div class="player-row">
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-details">${p.gamesRemaining} games remaining · Signed ${p.effectiveDate}</div>
          <div class="progress-bar"><div class="progress-fill ${status}" style="width:${Math.min(pct,100)}%"></div></div>
        </div>
        <div class="player-stats"><div class="games-count ${status}">${p.gamesPlayed}</div><div class="games-label">of ${p.gamesAllowed} (${Math.round(pct)}%)</div></div>
      </div>`;
    }
    html+=`</div></div>`;
  }
  html+='</div>';
  content.innerHTML=html;
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const resp=await fetch(CSV_URL);if(!resp.ok)throw new Error('HTTP '+resp.status);
    parseCSV(await resp.text());updateKPIs();renderTeams();
    document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value;renderTeams();});
  }catch(err){document.getElementById('content').innerHTML=`<div class="empty-state">Unable to load data: ${err.message}</div>`;}
});
</script>
</body>
</html>
