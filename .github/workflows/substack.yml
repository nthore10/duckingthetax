name: Sync Substack posts

on:
  # Scheduled auto-sync is disabled because it needs an RSS2JSON_API_KEY secret
  # to fetch reliably from GitHub's IPs. Re-enable this block once that key is set.
  # schedule:
  #   - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual runs only (Actions tab, or `gh workflow run`)

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest posts
        run: node scripts/fetch-substack.mjs
        env:
          RSS2JSON_API_KEY: ${{ secrets.RSS2JSON_API_KEY }}
      - name: Commit if changed
        run: |
          if git diff --quiet -- posts.json; then
            echo "No changes to posts.json."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "Update blog posts from Substack"
            git push
          fi
