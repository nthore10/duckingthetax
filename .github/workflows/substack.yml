name: Sync Substack posts

on:
  schedule:
    - cron: '17 */6 * * *'   # every 6 hours
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch latest posts
        run: node scripts/fetch-substack.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- posts.json; then
            echo "No changes to posts.json."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add posts.json
            git commit -m "Update blog posts from Substack"
            git push
          fi
